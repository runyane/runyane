  <section id="contact-page">
    <div class="contact-title">
      <div class="contact-header">
      <h1>Contact Me</h1>
      <p>For more information</p>
    </div>
    </div>
    <form>
      <fieldset class="contact-info">
        <legend>Contact Information</legend>
      <label>Title:</label>
      <select name="title" id="user-title" required>
        <option value="">Dr.</option>
        <option value="Mr." selected>Mr.</option>
        <option value="Mrs.">Mrs.</option>
        <option value="Ms.">Ms.</option>
        <option value="Ms.">Ms.</option>
      </select>
 
      <label>Full name:</label>
      <input type="text" name="name" id="user-name" placeholder="First and last name" required>
      
      <label>Email:</label>
      <input type="text" name="email" id="email" placeholder="example@email.com" required>
    </fieldset>
    <fieldset class="contact-type">
      <legend>Comment or Question</legend>
      <input type="checkbox" name="commentbtn" id="commentbtn" required>
      <label>Comment</label>
      <input type="checkbox" name="question" id="question" required>
      <label>Question</label>
    </fieldset>
    <fieldset class="message-field">
      <label>Message:</label>
      <textarea name="message" id="user-message" cols="40" rows="10" required></textarea>
    </fieldset>
      <button type="submit">Submit</button>
    </form>
  </section>
